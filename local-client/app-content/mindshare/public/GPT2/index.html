<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Redirecting to GPT2</title>
  <meta http-equiv="refresh" content="0; url=/GPT2/">
  <link rel="canonical" href="https://mojoaistudio.com/GPT2/">
  <meta name="robots" content="noindex">
  <script>
    const target = `/GPT2/${window.location.search}${window.location.hash}`;
    window.location.replace(target);
  </script>
</head>
<body>
  <p>Redirecting to <a href="/GPT2/">/GPT2/</a>.</p>
</body>
</html>
